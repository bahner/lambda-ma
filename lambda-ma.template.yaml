# λ-間 bootstrap template.
# Edit this file or actors/*.ma, then run `make`.
# Generated output is written to dist/lambda-ma.yaml.

runtime:
  grp:
    owners: []

  acls:
    open:
      "*": ["*"]
    scheduler:
      "#": [handle_cast]

  acl:
    "*":
      - ipfs
      - identity-publish
      - rpc

  kinds:
    /ma/scheme/actor/0.0.1:
      cid:
        "/": __SCHEME_ACTOR_CID__
      type: extism
      behaviour:
        "/": __SCHEME_STDLIB_CID__
      attributes:
        wasi: false
        stateful: true
      host_functions:
        - ma_reply
        - ma_set_state
        - ma_send
        - ma_ipfs_include
        - ma_create_entity

    /ma/root/0.0.1:
      extends: /ma/scheme/actor/0.0.1
      attributes:
        genesis: true
      behaviour:
        "/": __ROOT_BEHAVIOUR_CID__

    /ma/avatar/0.0.1:
      extends: /ma/scheme/actor/0.0.1
      behaviour:
        "/": __AVATAR_BEHAVIOUR_CID__

    /ma/room/0.0.1:
      extends: /ma/scheme/actor/0.0.1
      behaviour:
        "/": __ROOM_BEHAVIOUR_CID__

    /ma/exit/0.0.1:
      extends: /ma/scheme/actor/0.0.1
      behaviour:
        "/": __EXIT_BEHAVIOUR_CID__

    /ma/rubber-duck/0.0.1:
      extends: /ma/scheme/actor/0.0.1
      behaviour:
        "/": __DUCK_BEHAVIOUR_CID__

    /ma/scheduler/0.0.1:
      type: native
      attributes:
        stateful: true
        genesis: true

  entities:
    scheduler:
      kind: /ma/scheduler/0.0.1
      acl: scheduler

    root:
      kind: /ma/root/0.0.1
      acl: open
      init: |
        (set-prop! "start" (string-append (ma-get-config-key "runtime") "#construct"))
        (ma-save-state!)

    construct:
      kind: /ma/room/0.0.1
      attributes:
        genesis: true
      acl: open
      init: |
        (set-prop! "root" (string-append (ma-get-config-key "runtime") "#root"))
        (set-prop! "name" "The Construct")
        (set-prop! "description" "This is the Construct. It's our loading program. We can load anything... From clothing to equipment, weapons, training simulations; anything we need.")
        (ma-save-state!)
